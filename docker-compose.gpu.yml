# GPU compose — standalone file, no overlay needed
# Requires Docker Desktop (Windows) with GPU enabled, or Linux with nvidia-container-toolkit
#
# First-time setup:
#   Windows: Docker Desktop → Settings → Resources → GPU → Enable GPU → Apply & Restart
#   Linux:   sudo apt install nvidia-container-toolkit && sudo systemctl restart docker
#
# Usage:
#   docker compose -f docker-compose.gpu.yml up -d --build   (first run, builds image)
#   docker compose -f docker-compose.gpu.yml up -d           (subsequent runs)
#   docker compose -f docker-compose.gpu.yml down            (stop)
services:
  transcription:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transcription-service
    restart: unless-stopped
    ports:
      - "7896:7896"
    env_file:
      - .env
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - PYTHONPATH=/app
      - APP_MODEL_ROOT=/app/models
      - HF_HOME=/app/models/hf_cache
      - HF_HUB_CACHE=/app/models/hf_cache/hub
      - HF_HUB_OFFLINE=0
      - HUGGINGFACE_HUB_CACHE=/app/models/hf_cache/hub
      - TORCH_HOME=/app/models/torch
      - OV_CACHE_DIR=/app/models/ov_cache
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - APP_SUPPRESS_WARNING_LOGS=true
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - ASR_PARALLEL_MODE=auto
      - ASR_PARALLEL_MIN_VRAM_MB=12288
      - ASR_HARD_MEMORY_SAFE=true
      - MIN_NVIDIA_VRAM_MB=6000
      - ASR_8GB_CLASS_MAX_MB=9000
      - ASR_CLEAR_VRAM_AFTER_JOB=false
      - ASR_CLEAR_VRAM_BETWEEN_ENGINES=false
      - ASR_DEFAULT_ENGINES=Pathumma Whisper,Typhoon Whisper
      - ASR_CUDA_BATCH_SIZE=1
      - ASR_8GB_BATCH_SIZE=1
      - ASR_8GB_MAX_BATCH_SIZE=1
      - ASR_CUDA_MEMORY_FRACTION=0.90
      - ASR_CHUNK_LENGTH_S=30
      - ASR_8GB_CHUNK_LENGTH_S=40
      - ASR_8GB_MAX_CHUNK_LENGTH_S=40
      - ASR_8GB_RETRY_CHUNK_LENGTH_S=10
      - ASR_WORD_TIMESTAMPS_WITH_DIARIZATION=true
      - TYPHOON_WORD_TIMESTAMPS_ON_8GB=false
      - PATHUMMA_WORD_TIMESTAMPS_ON_8GB=false
      - ASR_LONG_FORM_MIN_DURATION_S=300
      - ASR_LONG_FORM_WINDOW_S=360
      - ASR_LONG_FORM_OVERLAP_S=30
      - ASR_SUSPICIOUS_FIRST_TS_S=60
      - ASR_TIMESTAMP_AUDIO_END_TOLERANCE_S=30
      - ASR_MAX_CHUNK_CHARS_PER_SECOND=35
      - ASR_ATTENTION_IMPLEMENTATION=sdpa
      - ASR_PRELOAD_MODE=eager
      - AUDIO_ENHANCE_DEFAULT=false
      - AUDIO_ENHANCE_TARGET_PEAK_DB=-3.0
      - AUDIO_ENHANCE_MAX_GAIN_DB=10.0
      - AUDIO_ENHANCE_NOISE_REDUCTION=0.65
      - DIARIZATION_MODEL_ID=pyannote/speaker-diarization-3.1
      - DIARIZATION_DEVICE=cpu
      - DIARIZATION_CUDA_MIN_VRAM_MB=12288
      - DIARIZATION_CUDA_MIN_FREE_MB=1024
      - DIARIZATION_ALLOW_8GB_CUDA=false
      - DIARIZATION_SEGMENTATION_THRESHOLD=0.42
      - DIARIZATION_MIN_DURATION_OFF=0.1
      - DIARIZATION_CLUSTERING_THRESHOLD=0.60
      - DIARIZATION_MIN_CLUSTER_SIZE=6
      - DIARIZATION_PREPROCESS_SR=44100
      - DIARIZATION_NOISE_REDUCTION=0.60
    volumes:
      # Persist models and transcripts — bind-mount project-local dirs
      - ./models:/app/models
      - ./storage:/app/storage
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:7896/gradio_api/startup-events')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
