# GPU compose — NVIDIA CUDA (PyTorch + pyannote on GPU when VRAM allows)
# Requires Docker Desktop GPU or nvidia-container-toolkit.
#
#   docker compose -f docker-compose.gpu.yml up -d --build
# UI: http://localhost:7988
#
# For OpenVINO / CPU AI (no NVIDIA GPU): docker-compose.openvino.yml (port 7987)
services:
  transcription:
    image: local-transcript-app
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - local-transcript-app
        - local-transcript-app:latest
    container_name: transcription-service
    restart: unless-stopped
    shm_size: "4gb"
    ports:
      - "7988:7896"
    env_file:
      - .env
    # environment: values below override .env (prevents stale local .env breaking GPU deploy)
    environment:
      - APP_VERSION=1.0.0
      - GRADIO_SERVER_PORT=7896
      - GRADIO_SERVER_NAME=0.0.0.0
      - APP_CPU_THREADS=16
      - OMP_NUM_THREADS=16
      - MKL_NUM_THREADS=16
      - OPENBLAS_NUM_THREADS=16
      - NUMEXPR_NUM_THREADS=16
      - TOKENIZERS_PARALLELISM=false
      - PYTHONPATH=/app
      - APP_MODEL_ROOT=/app/models
      - HF_HOME=/app/models/hf_cache
      - HF_HUB_CACHE=/app/models/hf_cache/hub
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - APP_AUTO_DOWNLOAD_MISSING_MODELS=false
      - HUGGINGFACE_HUB_CACHE=/app/models/hf_cache/hub
      - TORCH_HOME=/app/models/torch
      - OV_CACHE_DIR=/app/models/ov_cache
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - APP_SUPPRESS_WARNING_LOGS=false
      - PYTHONUNBUFFERED=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:128
      # --- ASR concurrency ---
      # 8 GB GPU staging: sequential engines, ASR unloads before CUDA diarization.
      - ASR_PARALLEL_MODE=sequential
      - ASR_PARALLEL_MIN_VRAM_MB=12288
      - ASR_ALLOW_8GB_PARALLEL=false
      - ASR_HARD_MEMORY_SAFE=true
      - ASR_8GB_QUALITY_MODE=true
      - MIN_NVIDIA_VRAM_MB=6000
      - ASR_8GB_CLASS_MAX_MB=9000
      - ASR_CLEAR_VRAM_AFTER_JOB=false
      - ASR_CLEAR_VRAM_BETWEEN_ENGINES=false
      - ASR_UNLOAD_FOR_DIARIZATION=true
      - ASR_SUPPRESS_HALLUCINATIONS=true
      - ASR_CONDITION_ON_PREVIOUS_TEXT=false
      - ASR_TEMPERATURE=0.0
      - ASR_COMPRESSION_RATIO_THRESHOLD=1.8
      - ASR_LOGPROB_THRESHOLD=-0.6
      - ASR_NO_SPEECH_THRESHOLD=0.5
      - ASR_DEFAULT_ENGINES=Auto
      - ASR_AUTO_POLICY=quality
      - ASR_NUM_BEAMS=8
      - ASR_QUALITY_PROFILE=high
      - ASR_CUDA_BATCH_SIZE=1
      - ASR_BATCH_MIN_FREE_MB=5000
      - ASR_WINDOW_CLEAR_MIN_FREE_MB=1280
      - ASR_8GB_BATCH_SIZE=1
      - ASR_8GB_MAX_BATCH_SIZE=1
      - ASR_CUDA_MEMORY_FRACTION=0.82
      - ASR_CO_RESIDENT_MIN_FREE_MB=256
      - ASR_CHUNK_LENGTH_S=90
      - ASR_8GB_CHUNK_LENGTH_S=45
      - ASR_8GB_MAX_CHUNK_LENGTH_S=45
      - ASR_8GB_RETRY_CHUNK_LENGTH_S=15
      - ASR_MIN_CHUNKED_DURATION_S=120
      - ASR_8GB_ALLOW_LARGE_CHUNKS=false
      - ASR_MAX_CONCURRENT_INFERENCE=1
      - ASR_UNLOAD_ON_CANCEL=false
      - UI_CANCEL_JOIN_TIMEOUT_S=120
      - DIARIZATION_TRANSCRIPT_MERGE_GAP_S=0.4
      - DIARIZATION_ASSIGN_TURN_MERGE_GAP_S=0.0
      - DIARIZATION_ASSIGN_IMBALANCE_RATIO=0.70
      - ASR_TURN_GUIDED=true
      - ASR_TURN_GUIDED_MAX_TURN_S=50
      - ASR_TURN_GUIDED_MERGE_GAP_S=0.35
      - ASR_TURN_GUIDED_MIN_TURN_S=0.15
      - ASR_CLEANUP_THAI_SPACING=true
      - DIARIZATION_MIN_OVERLAP_S=0.06
      - DIARIZATION_SPLIT_MIN_TURN_S=1.5
      - ASR_8GB_STREAM_MIN_DURATION_S=240
      - ASR_WORD_TIMESTAMPS_WITH_DIARIZATION=true
      - TYPHOON_WORD_TIMESTAMPS_ON_8GB=false
      - PATHUMMA_WORD_TIMESTAMPS_ON_8GB=false
      - ASR_LONG_FORM_MIN_DURATION_S=300
      - ASR_LONG_FORM_WINDOW_S=420
      - ASR_LONG_FORM_OVERLAP_S=75
      - ASR_SUSPICIOUS_FIRST_TS_S=60
      - ASR_TIMESTAMP_AUDIO_END_TOLERANCE_S=30
      - ASR_MAX_CHUNK_CHARS_PER_SECOND=35
      - ASR_ATTENTION_IMPLEMENTATION=sdpa
      - ASR_PRELOAD_MODE=lazy
      - ASR_KEEP_PRELOADED=false
      - ASR_CLEAR_VRAM_ON_MEDIA_CHANGE=false
      - UI_PREVIEW_MAX_MB=32
      - UI_PREVIEW_MAX_DURATION_S=300
      - UI_TRANSCRIPT_MAX_CHARS=100000
      - UI_TRANSCRIPT_MAX_LINES=500
      # GPU pipeline slots (queued when busy). Gradio tab concurrency is separate.
      # Restart container after changing this value (semaphore is fixed at startup).
      - UI_MAX_CONCURRENT_JOBS=4
      - UI_GRADIO_TRANSCRIBE_CONCURRENCY=8
      # Audio enhancement is CPU-only; ASR + diarization stay on GPU.
      - AUDIO_ENHANCE_USE_GPU=false
      - AUDIO_ENHANCE_DEFAULT=true
      - AUDIO_ENHANCE_WHEN_DIARIZATION=false
      - AUDIO_ENHANCE_TARGET_PEAK_DB=-0.5
      - AUDIO_ENHANCE_MAX_GAIN_DB=24
      - AUDIO_ENHANCE_NOISE_REDUCTION=0.0
      - AUDIO_ENHANCE_LOUDNORM_I=-14
      - AUDIO_ENHANCE_ATEMPO=1.0
      - AUDIO_ENHANCE_NOISE_PROFILE=leading
      - AUDIO_ENHANCE_NOISE_PROFILE_SECONDS=0.75
      - AUDIO_ENHANCE_GATE_THRESHOLD_DB=-42
      - AUDIO_ENHANCE_GATE_RATIO=6
      - AUDIO_ENHANCE_COMPRESSOR_THRESHOLD_DB=-18
      - AUDIO_ENHANCE_COMPRESSOR_RATIO=4
      - AUDIO_ENHANCE_LIMITER_THRESHOLD_DB=-0.5
      - DIARIZATION_MODEL_ID=pyannote/speaker-diarization-community-1
      # 8 GB GPU staging: unload ASR → CUDA diar (single pass) → CUDA turn-guided ASR.
      - DIARIZATION_DEVICE=cuda
      - DIARIZATION_GPU_CO_RESIDENT=false
      - DIARIZATION_KEEP_PRELOADED=false
      - DIARIZATION_PRELOAD_MODE=lazy
      - DIARIZATION_PRELOAD_DEVICE=cpu
      - DIARIZATION_CUDA_MIN_VRAM_MB=6000
      - DIARIZATION_CUDA_MIN_FREE_MB=768
      - DIARIZATION_CUDA_RUN_MIN_FREE_MB=512
      - DIARIZATION_ALLOW_8GB_CUDA=true
      - DIARIZATION_ACCURACY_MODE=true
      - DIARIZATION_MULTI_SAMPLE=false
      - DIARIZATION_SEGMENTATION_THRESHOLD=0.40
      - DIARIZATION_CLUSTERING_THRESHOLD=0.42
      - DIARIZATION_REFINE_AFTER_SEGMENTED=true
      - DIARIZATION_MEGA_TURN_MAX_REFINES=8
      - DIARIZATION_MEGA_TURN_RETRY_S=45
      - DIARIZATION_MEGA_TURN_SCORE_THRESHOLD_S=45
      - DIARIZATION_CHUNK_ALIGN_MIN_OVERLAP_S=1.5
      - DIARIZATION_PREPROCESS_SR=44100
      - DIARIZATION_SEGMENT_S=480
      - DIARIZATION_SEGMENT_OVERLAP_S=150
      - DIARIZATION_MAX_ASR_WINDOW_S=300
      - DIARIZATION_SEGMENT_LONG_AUDIO=true
      - DIARIZATION_SEGMENT_LONG_AUDIO_MIN_S=3600
      - DIARIZATION_NOISE_REDUCTION=0.0
    volumes:
      # Persist models and transcripts — bind-mount project-local dirs
      - ./models:/app/models
      - ./storage:/app/storage
    deploy:
      resources:
        limits:
          cpus: "16"
        reservations:
          cpus: "4"
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:7896/startup-events')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
