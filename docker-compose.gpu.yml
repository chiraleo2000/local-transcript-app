# GPU compose — standalone file, no overlay needed
# Requires Docker Desktop (Windows) with GPU enabled, or Linux with nvidia-container-toolkit
#
# First-time setup:
#   Windows: Docker Desktop → Settings → Resources → GPU → Enable GPU → Apply & Restart
#   Linux:   sudo apt install nvidia-container-toolkit && sudo systemctl restart docker
#
# GPU compose for the current app (local-transcript-app).
#   docker compose -f docker-compose.gpu.yml up -d --build
# UI: http://localhost:7988
services:
  transcription:
    image: local-transcript-app
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - local-transcript-app
        - local-transcript-app:latest
    container_name: transcription-service
    restart: unless-stopped
    shm_size: "4gb"
    ports:
      - "7988:7896"
    env_file:
      - .env
    # environment: values below override .env (prevents stale local .env breaking GPU deploy)
    environment:
      - APP_VERSION=1.2.3
      - GRADIO_SERVER_PORT=7896
      - GRADIO_SERVER_NAME=0.0.0.0
      - APP_CPU_THREADS=16
      - OMP_NUM_THREADS=16
      - MKL_NUM_THREADS=16
      - OPENBLAS_NUM_THREADS=16
      - NUMEXPR_NUM_THREADS=16
      - TOKENIZERS_PARALLELISM=false
      - PYTHONPATH=/app
      - APP_MODEL_ROOT=/app/models
      - HF_HOME=/app/models/hf_cache
      - HF_HUB_CACHE=/app/models/hf_cache/hub
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - APP_AUTO_DOWNLOAD_MISSING_MODELS=false
      - HUGGINGFACE_HUB_CACHE=/app/models/hf_cache/hub
      - TORCH_HOME=/app/models/torch
      - OV_CACHE_DIR=/app/models/ov_cache
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - APP_SUPPRESS_WARNING_LOGS=false
      - PYTHONUNBUFFERED=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      # --- ASR concurrency ---
      # On an 8 GB GPU, running BOTH 1.5 B Whisper models in parallel causes
      # CUDA driver OOM and corrupts the caching allocator (handles_.at INTERNAL
      # ASSERT FAILED). We run them sequentially instead, but with a much
      # larger batch so a single engine fully saturates the GPU. Total wall
      # time still beats audio/3 because batched fp16 inference is ~4x faster.
      - ASR_PARALLEL_MODE=sequential
      - ASR_PARALLEL_MIN_VRAM_MB=12288
      - ASR_ALLOW_8GB_PARALLEL=false
      - ASR_HARD_MEMORY_SAFE=true
      - MIN_NVIDIA_VRAM_MB=6000
      - ASR_8GB_CLASS_MAX_MB=9000
      - ASR_CLEAR_VRAM_AFTER_JOB=false
      - ASR_CLEAR_VRAM_BETWEEN_ENGINES=false
      - ASR_UNLOAD_FOR_DIARIZATION=false
      - ASR_SUPPRESS_HALLUCINATIONS=true
      - ASR_CONDITION_ON_PREVIOUS_TEXT=false
      - ASR_TEMPERATURE=0.0
      - ASR_COMPRESSION_RATIO_THRESHOLD=1.8
      - ASR_LOGPROB_THRESHOLD=-0.8
      - ASR_NO_SPEECH_THRESHOLD=0.5
      - ASR_DEFAULT_ENGINES=Auto
      - ASR_AUTO_POLICY=quality
      - ASR_QUALITY_PROFILE=high
      - ASR_CUDA_BATCH_SIZE=4
      - ASR_BATCH_MIN_FREE_MB=2500
      - ASR_WINDOW_CLEAR_MIN_FREE_MB=1800
      - ASR_8GB_BATCH_SIZE=4
      - ASR_8GB_MAX_BATCH_SIZE=4
      - ASR_CUDA_MEMORY_FRACTION=0.80
      - ASR_CHUNK_LENGTH_S=300
      - ASR_8GB_CHUNK_LENGTH_S=90
      - ASR_8GB_MAX_CHUNK_LENGTH_S=90
      - ASR_8GB_RETRY_CHUNK_LENGTH_S=15
      - ASR_MIN_CHUNKED_DURATION_S=120
      - ASR_8GB_ALLOW_LARGE_CHUNKS=true
      - ASR_MAX_CONCURRENT_INFERENCE=1
      - ASR_UNLOAD_ON_CANCEL=false
      - UI_CANCEL_JOIN_TIMEOUT_S=120
      - DIARIZATION_TRANSCRIPT_MERGE_GAP_S=1.0
      - DIARIZATION_ASSIGN_TURN_MERGE_GAP_S=1.0
      - ASR_8GB_STREAM_MIN_DURATION_S=240
      - ASR_WORD_TIMESTAMPS_WITH_DIARIZATION=true
      - TYPHOON_WORD_TIMESTAMPS_ON_8GB=false
      - PATHUMMA_WORD_TIMESTAMPS_ON_8GB=false
      - ASR_LONG_FORM_MIN_DURATION_S=300
      - ASR_LONG_FORM_WINDOW_S=300
      - ASR_LONG_FORM_OVERLAP_S=45
      - ASR_SUSPICIOUS_FIRST_TS_S=60
      - ASR_TIMESTAMP_AUDIO_END_TOLERANCE_S=30
      - ASR_MAX_CHUNK_CHARS_PER_SECOND=35
      - ASR_ATTENTION_IMPLEMENTATION=sdpa
      - ASR_PRELOAD_MODE=eager
      - ASR_KEEP_PRELOADED=true
      - ASR_CLEAR_VRAM_ON_MEDIA_CHANGE=false
      - UI_PREVIEW_MAX_MB=32
      - UI_PREVIEW_MAX_DURATION_S=300
      - UI_TRANSCRIPT_MAX_CHARS=100000
      - UI_TRANSCRIPT_MAX_LINES=500
      # GPU pipeline slots (queued when busy). Gradio tab concurrency is separate.
      # Restart container after changing this value (semaphore is fixed at startup).
      - UI_MAX_CONCURRENT_JOBS=4
      - UI_GRADIO_TRANSCRIBE_CONCURRENCY=8
      - AUDIO_ENHANCE_DEFAULT=true
      - AUDIO_ENHANCE_WHEN_DIARIZATION=true
      - AUDIO_ENHANCE_TARGET_PEAK_DB=-1.5
      - AUDIO_ENHANCE_MAX_GAIN_DB=18
      - AUDIO_ENHANCE_NOISE_REDUCTION=0.92
      - AUDIO_ENHANCE_LOUDNORM_I=-14
      - AUDIO_ENHANCE_ATEMPO=0.92
      - AUDIO_ENHANCE_NOISE_PROFILE=leading
      - AUDIO_ENHANCE_NOISE_PROFILE_SECONDS=0.75
      - DIARIZATION_MODEL_ID=pyannote/speaker-diarization-community-1
      # Auto: CUDA diarization when free VRAM allows ASR co-resident; else CPU.
      - DIARIZATION_DEVICE=auto
      - DIARIZATION_GPU_CO_RESIDENT=true
      - DIARIZATION_KEEP_PRELOADED=true
      - DIARIZATION_PRELOAD_MODE=eager
      - DIARIZATION_PRELOAD_DEVICE=cpu
      - DIARIZATION_CUDA_MIN_VRAM_MB=6000
      - DIARIZATION_CUDA_MIN_FREE_MB=1536
      - DIARIZATION_CUDA_RUN_MIN_FREE_MB=1024
      - DIARIZATION_ALLOW_8GB_CUDA=true
      - DIARIZATION_ACCURACY_MODE=true
      # Multi-SR sweep: 3 rates × 3 hyperparameter configs = 9 passes total.
      - DIARIZATION_MULTI_SAMPLE=true
      - DIARIZATION_MULTI_SAMPLE_SR=16000,22050,44100
      - DIARIZATION_MULTI_SAMPLE_PASSES=3
      - DIARIZATION_MULTI_SAMPLE_PASSES_8GB=3
      - DIARIZATION_MULTI_SAMPLE_MAX_TOTAL=9
      - DIARIZATION_MULTI_SAMPLE_EARLY_STOP=true
      - DIARIZATION_MULTI_SAMPLE_EARLY_STOP_SCORE=0.85
      - DIARIZATION_MULTI_SAMPLE_TUNE_WINDOW=false
      - DIARIZATION_MULTI_SAMPLE_FULL_GRID=false
      - DIARIZATION_REFINE_AFTER_SEGMENTED=true
      - DIARIZATION_MEGA_TURN_MAX_REFINES=4
      - DIARIZATION_MEGA_TURN_RETRY_S=90
      - DIARIZATION_CHUNK_ALIGN_MIN_OVERLAP_S=1.5
      - DIARIZATION_PREPROCESS_SR=44100
      - DIARIZATION_SEGMENT_S=360
      - DIARIZATION_SEGMENT_OVERLAP_S=90
      - DIARIZATION_MAX_ASR_WINDOW_S=300
      - DIARIZATION_SEGMENT_LONG_AUDIO=true
      - DIARIZATION_NOISE_REDUCTION=0.0
    volumes:
      # Persist models and transcripts — bind-mount project-local dirs
      - ./models:/app/models
      - ./storage:/app/storage
    deploy:
      resources:
        limits:
          cpus: "16"
        reservations:
          cpus: "4"
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:7896/startup-events')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
