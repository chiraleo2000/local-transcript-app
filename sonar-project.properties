sonar.projectKey=local-transcript-app
sonar.projectName=Local Transcript App
sonar.projectVersion=1.2.4

sonar.sources=backend,engines,app.py,sitecustomize.py
sonar.tests=tests
sonar.python.version=3.11

sonar.exclusions=**/models/**,**/storage/**,**/__pycache__/**,**/venv/**,**/.pytest_cache/**,**/dist/**,**/installer/**
sonar.test.exclusions=tests/output/**
sonar.coverage.exclusions=tests/**,scripts/**,app.py

sonar.python.coverage.reportPaths=coverage.xml
sonar.sourceEncoding=UTF-8
