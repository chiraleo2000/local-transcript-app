services:
  transcription:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transcription-service
    restart: unless-stopped
    ports:
      - "7896:7896"
    env_file:
      - .env
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
    volumes:
      # Bind-mount so models and transcripts persist and don't re-download
      - ./models:/app/models
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "python3", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:7896/gradio_api/startup-events')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
