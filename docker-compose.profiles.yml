# Unified compose with profiles. Always uses local ./models (offline-only).
#
# Usage:
#   docker compose -f docker-compose.profiles.yml --profile openvino up -d --build
#   docker compose -f docker-compose.profiles.yml --profile nvidia up -d --build
#
# Notes:
# - Windows Docker Desktop typically runs the OpenVINO container CPU-only (Linux VM).
#   For Intel Arc GPU/NPU acceleration prefer native Windows OpenVINO (`run.bat ov-gpu` / `ov-npu`).
services:
  transcription-openvino:
    profiles: ["openvino", "cpu"]
    build:
      context: .
      dockerfile: Dockerfile.openvino
    image: local-transcript-app-openvino
    container_name: transcription-service-openvino
    restart: unless-stopped
    shm_size: "4gb"
    ports:
      - "7987:7896"
    env_file:
      - .env
    environment:
      - APP_VERSION=1.2.4
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7896
      - PYTHONPATH=/app
      - APP_MODEL_ROOT=/app/models
      - HF_HOME=/app/models/hf_cache
      - HF_HUB_CACHE=/app/models/hf_cache/hub
      - HUGGINGFACE_HUB_CACHE=/app/models/hf_cache/hub
      - TORCH_HOME=/app/models/torch
      - OV_CACHE_DIR=/app/models/ov_cache
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - APP_AUTO_DOWNLOAD_MISSING_MODELS=false
      - APP_FORCE_BACKEND=openvino
      - OV_DEVICE=GPU
      - HF_HUB_DISABLE_TELEMETRY=1
      - GRADIO_ANALYTICS_ENABLED=false
      - GRADIO_TELEMETRY_ENABLED=false
      # Require diarization models only if your model pack includes them.
      - APP_REQUIRE_DIARIZATION_MODELS=false
      # Keep both ASR engines preloaded for fast switching
      - ASR_PRELOAD_MODE=eager
      - ASR_KEEP_PRELOADED=true
      - DIARIZATION_PRELOAD_MODE=eager
      - DIARIZATION_KEEP_PRELOADED=true
      - DIARIZATION_DEVICE=cpu
    volumes:
      - ./models:/app/models
      - ./storage:/app/storage

  transcription-nvidia:
    profiles: ["nvidia"]
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - local-transcript-app:latest
    image: local-transcript-app:latest
    container_name: transcription-service
    restart: unless-stopped
    shm_size: "4gb"
    ports:
      - "7988:7896"
    env_file:
      - .env
    environment:
      - APP_VERSION=1.2.4
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7896
      - PYTHONPATH=/app
      - APP_MODEL_ROOT=/app/models
      - HF_HOME=/app/models/hf_cache
      - HF_HUB_CACHE=/app/models/hf_cache/hub
      - HUGGINGFACE_HUB_CACHE=/app/models/hf_cache/hub
      - TORCH_HOME=/app/models/torch
      - OV_CACHE_DIR=/app/models/ov_cache
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - APP_AUTO_DOWNLOAD_MISSING_MODELS=false
      - HF_HUB_DISABLE_TELEMETRY=1
      - GRADIO_ANALYTICS_ENABLED=false
      - GRADIO_TELEMETRY_ENABLED=false
      # Enforce 8GB+ via policy (MIN_NVIDIA_VRAM_MB)
      - MIN_NVIDIA_VRAM_MB=8192
      - APP_REQUIRE_DIARIZATION_MODELS=true
    volumes:
      - ./models:/app/models
      - ./storage:/app/storage
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]

