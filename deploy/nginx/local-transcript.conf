# Reverse proxy for Local Transcript App (GPU Docker on :7988)
#
# Include from nginx.conf, e.g.:
#   include path/to/deploy/nginx/local-transcript.conf;
#
# TLS: point ssl_certificate / ssl_certificate_key at your certs.
# Subpath: set GRADIO_ROOT_PATH=/transcript on the app and use the /transcript/ block.

upstream local_transcript_gpu {
    server 127.0.0.1:7988;
    keepalive 8;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name transcript.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name transcript.example.com;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    client_max_body_size 512m;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 60s;

    # Root mount (GRADIO_ROOT_PATH empty)
    location / {
        proxy_pass http://local_transcript_gpu;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
    }

    # Subpath mount — only if GRADIO_ROOT_PATH=/transcript
    # location /transcript/ {
    #     proxy_pass http://local_transcript_gpu;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection $connection_upgrade;
    #     proxy_buffering off;
    # }
}
