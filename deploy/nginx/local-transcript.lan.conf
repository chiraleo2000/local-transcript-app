# LAN reverse proxy for Local Transcript App (GPU Docker on 127.0.0.1:7988)
#
# Generated/used by deploy/scripts/Setup-PublicAccess.ps1
# HTTP :80 for office LAN; optional TLS on :443 when certs exist.

upstream local_transcript_gpu {
    server 127.0.0.1:7988;
    keepalive 8;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 512m;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 60s;

    location / {
        proxy_pass http://local_transcript_gpu;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
    }
}

