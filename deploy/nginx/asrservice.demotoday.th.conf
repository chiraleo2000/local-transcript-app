# Public reverse proxy for asrservice.demotoday.th
# Upstream: GPU Docker on 127.0.0.1:7988
# Wired by Setup-PublicAccess.ps1 (-Audience internet -PublicHost asrservice.demotoday.th -EnableTls)

upstream local_transcript_gpu {
    server 127.0.0.1:7988;
    keepalive 8;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name asrservice.demotoday.th;

    # ACME HTTP-01 challenge path (win-acme / certbot)
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name asrservice.demotoday.th;

    ssl_certificate     ../certs/fullchain.pem;
    ssl_certificate_key ../certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 512m;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 60s;

    location / {
        proxy_pass http://local_transcript_gpu;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
    }
}
